<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../task 2/css/style.css">
    <title>To Do List</title>
</head>

<body>

    <header class="min-h30">
        <h1 class="text-center pt-5 p-3">To Do List</h1>
    </header>


    <section class="container">
        <form class="text-center min-h30 d-flex justify-content-center align-items-center mx-auto">
            <div class="bg-primary-subtle border-0 rounded" style="width: fit-content;">
                <input type="text" placeholder="" class="mr-0">
                <button type="submit" class="ml-0"><i class="fas fa-plus"></i></button>
            </div>
            <div class="select">
                <select class="filter rounded border-primary bg-primary-subtle" name="todos">
                    <option value="all">All</option>
                    <option value="finished">Finished</option>
                    <option value="uncompleted">Uncompleted</option>
                </select>
            </div>
        </form>

        <div class="todo-container">
            <ul class="todo-list">
            </ul>
        </div>

    </section>








    <script src="../task 2/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://kit.fontawesome.com/f4eb5a605d.js" crossorigin="anonymous"></script>
</body>

</html>
